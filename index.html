<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taman Pembelajaran Bahasa Melayu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #2c3e50;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 1120px;
            aspect-ratio: 16 / 9;
            background-color: var(--bg);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex: 1;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-main {
            background-color: var(--primary);
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 0 #d64545;
            text-align: center;
        }

        .btn-main:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        .topic-card {
            background: white;
            border: 4px solid var(--secondary);
            border-radius: 24px;
            padding: 15px;
            width: 210px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .topic-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .game-select-btn {
            background: white;
            border: 3px solid var(--secondary);
            padding: 15px 30px;
            border-radius: 20px;
            margin: 8px;
            width: 100%;
            max-width: 450px;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .game-select-btn:hover { background: var(--secondary); color: white; }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(255,255,255,0.95);
            position: absolute;
            top: 0;
            z-index: 50;
            border-bottom: 2px solid #eee;
        }

        .quiz-option {
            background: white;
            border: 3px solid #eee;
            padding: 16px;
            border-radius: 20px;
            margin: 6px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .word-bubble {
            padding: 15px 25px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .word-bubble.selected { background: var(--secondary); color: white; border-color: white; }

        .correct { background-color: #a7ffeb !important; border-color: #00bfa5 !important; }
        .wrong { background-color: #ffcdd2 !important; border-color: #d32f2f !important; }

        .icon-grid-item {
            font-size: 5rem;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 140px;
        }

        #music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        svg.icon-svg {
            width: 80px;
            height: 80px;
            fill: #4A5568;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="music-toggle" onclick="toggleMusic()">🔈</div>

    <div class="game-header" id="header" style="display:none">
        <button id="back-btn" onclick="goBack()" class="text-sm bg-gray-100 px-4 py-2 rounded-full font-bold uppercase tracking-wider">🏠 Kembali</button>
        <div id="progress-text" class="font-bold text-gray-400 uppercase tracking-widest text-xs"></div>
        <div id="score-text" class="text-red-500 font-bold tracking-tighter">MARKAH: 0</div>
    </div>

    <!-- 1. Menu Utama -->
    <div id="screen-menu" class="screen active">
        <h1 class="text-5xl font-bold mb-10 text-red-500 text-center">🇲🇾 Taman Belajar<br>Bahasa Melayu</h1>
        <div class="grid grid-cols-2 gap-6">
            <div class="topic-card" onclick="startTopic(1)">
                <div class="text-5xl mb-3">🏫</div>
                <div class="font-bold">TOPIK 1</div>
                <div class="text-xs text-gray-400">Hari Pertama Sekolah</div>
            </div>
            <div class="topic-card" onclick="startTopic(2)">
                <div class="text-5xl mb-3">👫</div>
                <div class="font-bold">TOPIK 2</div>
                <div class="text-xs text-gray-400">Rakan Sekolah</div>
            </div>
            <div class="topic-card" onclick="startTopic(3)">
                <div class="text-5xl mb-3">🏠</div>
                <div class="font-bold">TOPIK 3</div>
                <div class="text-xs text-gray-400">Keluarga Saya</div>
            </div>
            <div class="topic-card" onclick="startTopic(4)">
                <div class="text-5xl mb-3">📚</div>
                <div class="font-bold">TOPIK 4</div>
                <div class="text-xs text-gray-400">Kelas Saya</div>
            </div>
        </div>
    </div>

    <!-- 2. Sub-menu -->
    <div id="screen-submenu" class="screen">
        <h2 id="submenu-title" class="text-3xl font-bold mb-8 text-gray-700">Pilih Permainan</h2>
        <div id="submenu-list" class="flex flex-wrap justify-center items-center w-full max-w-4xl"></div>
    </div>

    <!-- 3. Skrin Game -->
    <div id="screen-game" class="screen">
        <div id="game-content" class="w-full flex flex-col items-center justify-center"></div>
    </div>

    <!-- 4. Keputusan -->
    <div id="screen-result" class="screen">
        <div class="text-8xl mb-4">🏆</div>
        <h2 class="text-4xl font-bold mb-2">SYABAS!</h2>
        <p id="result-message" class="text-2xl mb-8 text-gray-500"></p>
        <button id="result-back-btn" class="btn-main text-lg">SELESAI</button>
    </div>
</div>

<script>
    // SVGs for clarity
    const ICONS = {
        meja: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 18h16v-2h-1l1-6H4l1 6H4v2zM5.5 12h13l-.67 4H6.17l-.67-4zM2 20h20v-2H2v2z"/></svg>`,
        papan_notis: `<svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 7h3v3H7zM14 7h3v3h-3zM7 14h3v3H7zM14 14h3v3h-3z" fill="currentColor"/></svg>`,
        leher: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5zm3 8a3 3 0 0 1-6 0V7a3 3 0 0 1 6 0zM7 15c-1.1 0-2 .9-2 2v5h14v-5c0-1.1-.9-2-2-2h-1l-1 2h-4l-1-2H7z"/><path d="M12 13l-1.5 2h3z"/></svg>`,
        bahu: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm-7 14c0-2.2 1.8-4 4-4h6c2.2 0 4 1.8 4 4v4H5v-4z"/><circle cx="7" cy="15" r="2" fill="red" opacity="0.6"/></svg>`,
        panjang: `📏➖➖➖`,
        pendek: `📏`
    };

    const gameData = {
        1: {
            title: "Topik 1: Hari Pertama Sekolah",
            games: [
                { type: 'choice', title: 'Mari Berbual', questions: [
                    { q: 'Selamat pagi', options: ['Selamat pagi', 'Selamat malam'], a: 0 },
                    { q: 'Apa nama kamu?', options: ['Nama saya Eden', 'Saya baik'], a: 0 },
                    { q: 'Apa khabar?', options: ['Saya baik', 'Jumpa lagi'], a: 0 },
                    { q: 'Jumpa lagi', options: ['Terima kasih', 'Jumpa lagi'], a: 1 }
                ]},
                { type: 'color_click', title: 'Warna Apa Ini?', questions: [
                    { color: '#FF0000', options: ['Merah', 'Biru'], a: 0 },
                    { color: '#FFFF00', options: ['Kuning', 'Hijau'], a: 0 },
                    { color: '#0000FF', options: ['Biru', 'Hitam'], a: 0 },
                    { color: '#00FF00', options: ['Hijau', 'Putih'], a: 0 },
                    { color: '#FFA500', options: ['Oren', 'Ungu'], a: 0 },
                    { color: '#800080', options: ['Ungu', 'Hitam'], a: 0 },
                    { color: '#000000', options: ['Hitam', 'Putih'], a: 0 },
                    { color: '#FFFFFF', options: ['Putih', 'Merah'], a: 0 }
                ]}
            ]
        },
        2: {
            title: "Topik 2: Rakan Sekolah",
            games: [
                { type: 'sequence_words', title: 'Susun Nombor (1-10)', items: ['Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Lapan', 'Sembilan', 'Sepuluh'] },
                { type: 'choice', title: 'Perasaan Saya', questions: [
                    { q: '😊', options: ['Gembira', 'Sedih'], a: 0 },
                    { q: '😢', options: ['Marah', 'Sedih'], a: 1 },
                    { q: '😡', options: ['Marah', 'Takut'], a: 0 },
                    { q: '😨', options: ['Gembira', 'Takut'], a: 1 }
                ]}
            ]
        },
        3: {
            title: "Topik 3: Keluarga Saya",
            games: [
                { type: 'hunt_multi', title: 'Anggota Badan', items: [
                    { icon: '👦', name: 'Muka' }, { icon: ICONS.bahu, name: 'Bahu' }, { icon: '🤰', name: 'Perut' }, { icon: '🦵', name: 'Lutut' },
                    { icon: '👣', name: 'Jari kaki' }, { icon: '🦶', name: 'Kaki' }, { icon: '🖐️', name: 'Jari tangan' }, { icon: '✋', name: 'Tangan' },
                    { icon: ICONS.leher, name: 'Leher' }, { icon: '👃', name: 'Hidung' }, { icon: '👂', name: 'Telinga' }, { icon: '👄', name: 'Mulut' },
                    { icon: '🦷', name: 'Gigi' }, { icon: '👀', name: 'Mata' }, { icon: '💇', name: 'Rambut' }, { icon: '🧔', name: 'Dagu' },
                    { icon: '💋', name: 'Bibir' }, { icon: '🧒', name: 'Dahi' }
                ]},
                { type: 'compare', title: 'Perbandingan', questions: [
                    { q: 'BESAR', options: ['🐘', '🐜'], a: 0 },
                    { q: 'KECIL', options: ['🐘', '🐜'], a: 1 },
                    { q: 'TINGGI', options: ['🦒', '🐕'], a: 0 },
                    { q: 'RENDAH', options: ['🦒', '🐕'], a: 1 },
                    { q: 'PANJANG', options: [ICONS.panjang, ICONS.pendek], a: 0 },
                    { q: 'PENDEK', options: [ICONS.panjang, ICONS.pendek], a: 1 },
                    { q: 'GEMUK', options: ['🎅', '🏃'], a: 0 },
                    { q: 'KURUS', options: ['🎅', '🏃'], a: 1 }
                ]},
                { type: 'hunt_multi', title: 'Hobi Saya', items: [
                    { icon: '⚽', name: 'Bermain bola' }, { icon: '🚲', name: 'Menunggang basikal' },
                    { icon: '🚗🧽', name: 'Mencuci kereta' }, { icon: '🚶', name: 'Berjalan-jalan' },
                    { icon: '🌸', name: 'Menanam bunga' }, { icon: '🏸', name: 'Bermain pickleball' }
                ]}
            ]
        },
        4: {
            title: "Topik 4: Kelas Saya",
            games: [
                { type: 'hunt_multi', title: 'Benda di Dalam Kelas', items: [
                    { icon: '🕒', name: 'Jam' }, { icon: '🪟', name: 'Tingkap' }, { icon: '⬜', name: 'Papan putih' },
                    { icon: ICONS.papan_notis, name: 'Papan notis' }, { icon: '💻', name: 'Komputer' }, { icon: '🗄️', name: 'Kabinet' },
                    { icon: '🗑️', name: 'Bakul sampah' }, { icon: '🪑', name: 'Kerusi' }, { icon: '🚪', name: 'Pintu' },
                    { icon: '📚', name: 'Rak buku' }, { icon: ICONS.meja, name: 'Meja' }
                ]},
                { type: 'hunt_multi', title: 'Alat Tulis Saya', items: [
                    { icon: '✏️', name: 'Pensel' }, { icon: '🧼', name: 'Pemadam' },
                    { icon: '📏', name: 'Pembaris' }, { icon: '📓', name: 'Buku latihan' },
                    { icon: '📕', name: 'Buku teks' }, { icon: '🖍️', name: 'Krayon' }, { icon: '👝', name: 'Bekas pensel' }
                ]}
            ]
        }
    };

    let currentTopicId = null, score = 0, audioCtx = null, isAudioPlaying = false;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showMenu() {
        currentTopicId = null;
        switchScreen('screen-menu');
        document.getElementById('header').style.display = 'none';
    }

    function startTopic(id) {
        currentTopicId = id;
        const topic = gameData[id];
        document.getElementById('header').style.display = 'flex';
        document.getElementById('back-btn').onclick = showMenu;
        document.getElementById('submenu-title').innerText = topic.title;
        
        const list = document.getElementById('submenu-list');
        list.innerHTML = "";
        topic.games.forEach((game, index) => {
            const btn = document.createElement('div');
            btn.className = "game-select-btn";
            btn.innerText = game.title;
            btn.onclick = () => selectGame(index);
            list.appendChild(btn);
        });
        
        switchScreen('screen-submenu');
        document.getElementById('progress-text').innerText = topic.title;
        document.getElementById('score-text').innerText = `MARKAH: 0`;
    }

    function goBack() {
        if (document.getElementById('screen-submenu').classList.contains('active')) {
            showMenu();
        } else {
            startTopic(currentTopicId);
        }
    }

    function selectGame(index) {
        const game = gameData[currentTopicId].games[index];
        score = 0;
        document.getElementById('score-text').innerText = `MARKAH: 0`;
        document.getElementById('back-btn').onclick = () => startTopic(currentTopicId);
        switchScreen('screen-game');
        loadGame(game);
    }

    function loadGame(game) {
        const content = document.getElementById('game-content');
        content.innerHTML = "";
        document.getElementById('progress-text').innerText = game.title;

        switch(game.type) {
            case 'choice': renderChoice(game); break;
            case 'color_click': renderColor(game); break;
            case 'sequence_words': renderSequence(game); break;
            case 'compare': renderCompare(game); break;
            case 'hunt_multi': renderHunt(game); break;
        }
    }

    function renderChoice(game) {
        let qIdx = 0;
        const nextQ = () => {
            const q = game.questions[qIdx];
            document.getElementById('game-content').innerHTML = `
                <div class="text-8xl mb-8">${q.q}</div>
                <div class="flex flex-col w-full items-center">
                    ${q.options.map((opt, i) => `<div class="quiz-option" onclick="handleChoice(${i}, ${q.a})">${opt}</div>`).join('')}
                </div>`;
        };
        window.handleChoice = (idx, correct) => {
            const opts = document.querySelectorAll('.quiz-option');
            if(idx === correct) { opts[idx].classList.add('correct'); score += 10; playCorrectSound(); }
            else { opts[idx].classList.add('wrong'); opts[correct].classList.add('correct'); playWrongSound(); }
            document.getElementById('score-text').innerText = `MARKAH: ${score}`;
            setTimeout(() => { qIdx++; if(qIdx < game.questions.length) nextQ(); else finishGame(); }, 800);
        };
        nextQ();
    }

    function renderColor(game) {
        let qIdx = 0;
        const nextQ = () => {
            const q = game.questions[qIdx];
            document.getElementById('game-content').innerHTML = `
                <div class="w-64 h-32 rounded-3xl mb-8 shadow-md border-4 border-white" style="background-color: ${q.color}"></div>
                <div class="flex flex-col w-full items-center">
                    ${q.options.map((opt, i) => `<div class="quiz-option" onclick="handleChoice(${i}, ${q.a})">${opt}</div>`).join('')}
                </div>`;
        };
        window.handleChoice = (idx, correct) => {
            const opts = document.querySelectorAll('.quiz-option');
            if(idx === correct) { opts[idx].classList.add('correct'); score += 10; playCorrectSound(); }
            else { opts[idx].classList.add('wrong'); opts[correct].classList.add('correct'); playWrongSound(); }
            document.getElementById('score-text').innerText = `MARKAH: ${score}`;
            setTimeout(() => { qIdx++; if(qIdx < game.questions.length) nextQ(); else finishGame(); }, 800);
        };
        nextQ();
    }

    function renderSequence(game) {
        let nextIdx = 0;
        const shuffled = [...game.items].sort(() => Math.random() - 0.5);
        document.getElementById('game-content').innerHTML = `
            <h3 class="text-2xl font-bold mb-8 text-gray-700 uppercase">Susun ikut turutan:</h3>
            <div class="flex flex-wrap justify-center gap-4 max-w-3xl">
                ${shuffled.map(word => `<div class="word-bubble" id="word-${word}" onclick="handleSeq('${word}')">${word}</div>`).join('')}
            </div>`;
        window.handleSeq = (word) => {
            if(word === game.items[nextIdx]) {
                document.getElementById(`word-${word}`).classList.add('selected');
                document.getElementById(`word-${word}`).onclick = null;
                nextIdx++; score += 5; playCorrectSound();
                if(nextIdx >= game.items.length) setTimeout(finishGame, 800);
            } else { playWrongSound(); }
            document.getElementById('score-text').innerText = `MARKAH: ${score}`;
        };
    }

    function renderCompare(game) {
        let qIdx = 0;
        const nextQ = () => {
            const q = game.questions[qIdx];
            document.getElementById('game-content').innerHTML = `
                <div class="text-7xl font-bold mb-10 text-red-500 uppercase tracking-widest">${q.q}</div>
                <div class="flex gap-12">
                    <div class="quiz-option text-8xl py-12 w-72 h-72 flex items-center justify-center" onclick="handleChoice(${0}, ${q.a})">${q.options[0]}</div>
                    <div class="quiz-option text-8xl py-12 w-72 h-72 flex items-center justify-center" onclick="handleChoice(${1}, ${q.a})">${q.options[1]}</div>
                </div>`;
        };
        window.handleChoice = (idx, correct) => {
            const opts = document.querySelectorAll('.quiz-option');
            if(idx === correct) { opts[idx].classList.add('correct'); score += 15; playCorrectSound(); }
            else { opts[idx].classList.add('wrong'); opts[correct].classList.add('correct'); playWrongSound(); }
            document.getElementById('score-text').innerText = `MARKAH: ${score}`;
            setTimeout(() => { qIdx++; if(qIdx < game.questions.length) nextQ(); else finishGame(); }, 800);
        };
        nextQ();
    }

    function renderHunt(game) {
        let itemsLeft = [...game.items].sort(() => Math.random() - 0.5);
        const nextH = () => {
            if(itemsLeft.length === 0) { finishGame(); return; }
            const target = itemsLeft[0];
            let choices = [target];
            while(choices.length < 4) { 
                let r = game.items[Math.floor(Math.random() * game.items.length)]; 
                if(!choices.some(c => c.name === r.name)) choices.push(r); 
            }
            choices.sort(() => Math.random() - 0.5);
            document.getElementById('game-content').innerHTML = `
                <h3 class="text-3xl font-bold mb-4 text-gray-400">CARI:</h3>
                <h2 class="text-6xl font-bold mb-10 text-blue-600 uppercase tracking-tighter">${target.name}</h2>
                <div class="grid grid-cols-4 gap-8">
                    ${choices.map(c => `<div class="icon-grid-item" onclick="checkHunt('${c.name}', '${target.name}')">${c.icon}</div>`).join('')}
                </div>`;
        };
        window.checkHunt = (name, target) => {
            if(name === target) { score += 15; playCorrectSound(); itemsLeft.shift(); nextH(); }
            else { playWrongSound(); }
            document.getElementById('score-text').innerText = `MARKAH: ${score}`;
        };
        nextH();
    }

    function finishGame() {
        switchScreen('screen-result');
        document.getElementById('header').style.display = 'none';
        document.getElementById('result-message').innerText = `Tahniah! Permainan Selesai.\nJumlah Markah: ${score}`;
        document.getElementById('result-back-btn').onclick = () => startTopic(currentTopicId);
    }

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playCorrectSound() {
        initAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(880, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }
    function playWrongSound() {
        initAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(120, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }
    function toggleMusic() {
        initAudio();
        if(isAudioPlaying) { isAudioPlaying = false; document.getElementById('music-toggle').innerText = '🔈'; }
        else { isAudioPlaying = true; document.getElementById('music-toggle').innerText = '🎵'; playBGM(); }
    }
    function playBGM() {
        const notes = [349, 392, 440, 523]; let i = 0;
        function n() { if(!isAudioPlaying) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.frequency.value = notes[i]; o.connect(g); g.connect(audioCtx.destination); g.gain.value = 0.02;
            o.start(); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8); o.stop(audioCtx.currentTime + 0.8);
            i = (i + 1) % notes.length; setTimeout(n, 600); }
        n();
    }
</script>
